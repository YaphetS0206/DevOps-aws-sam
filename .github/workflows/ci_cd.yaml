name: App Serverless CI/CD (AWS SAM)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  AWS_REGION: us-east-1
  STACK_NAME: sam-app
  

jobs:

  validate:
    name: Validate & Security Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install aws-sam-cli cfn-lint checkov pytest bandit

      - name: Validate SAM template
        run: sam validate --region $AWS_REGION

      - name: Lint CloudFormation.  ## validacion de sintaxis y mejores prácticas
        run: cfn-lint template.yaml

     ## Ignored checks:
        # CKV_AWS_117 → Lambda VPC (no requiere para el uso)
        # CKV_AWS_116 → DLQ not needed for sync API
        # CKV_AWS_115 → concurrency not required in PoC
      - name: Security scan (Bandit)
        run: bandit -r src/ -f json -o report.json

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
            name: bandit-report
            path: report.json

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$(pwd)" >> $GITHUB_ENV

     ## Unit Tests (pytest library)
      - name: Run unit tests
        run: pytest


  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SAM CLI
        run: pip install aws-sam-cli

      - name: Build SAM app
        run: sam build -t template.yaml

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sam-build 
          path: .aws-sam/build/

      - name: Debug build output
        run: ls -la


  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: sam-build
          path: .aws-sam/build/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy SAM
        run: |
          sam deploy \
            --stack-name $STACK_NAME \
            --region $AWS_REGION \
            --resolve-s3 \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --capabilities CAPABILITY_IAM

      - name: Get API URL
        id: api
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --query "Stacks[0].Outputs[?OutputKey=='HelloApi'].OutputValue" \
            --output text)

          if [ -z "$API_URL" ]; then
            echo "API URL not found"
            exit 1
          fi

          echo "api_url=$API_URL" >> $GITHUB_OUTPUT

      - name: Debug outputs
        run: |
            aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --query "Stacks[0].Outputs"

      - name: Post-deploy validation test
        run: |
            URL=${{ steps.api.outputs.api_url }}

            echo "Testing $URL"

            for i in {1..5}; do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" $URL)

            if [ "$STATUS" -eq 200 ]; then
                echo "Integration test passed ✅"
                exit 0
            fi

            echo "Retrying..."
            sleep 5
            done

            echo "Integration test failed ❌"
            exit 1

      